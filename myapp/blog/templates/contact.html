{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-center mt-5">
        <div class="d-flex gap-3 flex-column" style="width: 100%; max-width: 800px;">
            <h3>Contact Form</h3>
            
            <div class="mb-3">
                {% for field in form %}
                    <div class="mb-1">
                        <strong>{{ field.label }}:</strong> 
                        
                        {% for error in field.errors %}
                            <span class="text-danger">{{ error }}</span>
                        {% endfor %}
                    </div>
                {% endfor %}
            </div>

            <form method="post" class="row g-3">
                {% csrf_token %}
                
                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ form.name.value|default:'' }}">
                </div>
                
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ form.email.value|default:'' }}">
                </div>
                
                <div class="col-12">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="4">{{ form.message.value|default:'' }}</textarea>
                </div>
                
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
                
            </form>
        </div>
    </div>
</div>
{% endblock %}
